<!DOCTYPE html> 
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подать объявление</title>
    <!-- Ссылка на стили -->
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="app" style="display:none;">
        <div class="section">
            <label id="wa_label_select_channel">...</label>
            <select id="channel_select"></select>
        </div>

        <div class="section">
            <label id="wa_label_text">...</label>
            <textarea id="ad_text"></textarea>
            <div class="hint" id="wa_hint_text">...</div>
        </div>

        <div class="section">
            <label id="wa_label_name">...</label>
            <input type="text" id="contact_name">
        </div>

        <div class="section">
            <label id="wa_label_phone">...</label>
            <input type="text" id="contact_phone">
        </div>

        <button id="submit_btn">...</button>
    </div>

    <div id="loader" class="loading">...</div>

    <script>
        const tg = window.Telegram.WebApp;
        // Твой адрес туннеля
        const API_BASE = "https://tgm-sync.sigmaboy.us/api"; 
        
        const user = tg.initDataUnsafe.user || { id: 12345, first_name: "Тест", language_code: "ru" };
        const userLang = user.language_code || 'en';

        async function init() {
            tg.ready();
            tg.expand();

            try {
                // 1. Загружаем локализацию
                const locRes = await fetch(`${API_BASE}/loc?lang=${userLang}`);
                const loc = await locRes.json();
                window.LOC = loc;

                // Расстановка текстов
                const textIds = ['wa_label_select_channel', 'wa_label_text', 'wa_hint_text', 'wa_label_name', 'wa_label_phone', 'submit_btn', 'loader'];
                textIds.forEach(id => { if(document.getElementById(id)) document.getElementById(id).textContent = loc[id]; });
                
                document.getElementById('ad_text').placeholder = loc.wa_placeholder_text || "";
                document.getElementById('contact_name').placeholder = loc.wa_placeholder_name || "";
                document.getElementById('contact_phone').placeholder = loc.wa_placeholder_phone || "";

                // 2. Загружаем список каналов
                const chRes = await fetch(`${API_BASE}/channels`);
                const chData = await chRes.json();
                const select = document.getElementById('channel_select');
                chData.channels.forEach(ch => {
                    const opt = document.createElement('option');
                    opt.value = ch.id;
                    opt.textContent = ch.name;
                    select.appendChild(opt);
                });

                // 3. Загружаем профиль юзера
                const prRes = await fetch(`${API_BASE}/profile?user_id=${user.id}`);
                const prData = await prRes.json();
                
                if (prData.data) {
                    document.getElementById('contact_name').value = prData.data.name || user.first_name || "";
                    document.getElementById('contact_phone').value = prData.data.phone || "";
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'flex';

            } catch (e) {
                document.getElementById('loader').textContent = "API Connection Error";
                console.error(e);
            }
        }
        
        document.getElementById('submit_btn').onclick = async () => {
            const btn = document.getElementById('submit_btn');
            const data = {
                user_id: user.id,
                channel_id: document.getElementById('channel_select').value,
                text: document.getElementById('ad_text').value,
                contact_info: {
                    name: document.getElementById('contact_name').value,
                    phone: document.getElementById('contact_phone').value
                }
            };

            if (data.text.length < 20) {
                return alert("Текст слишком короткий!");
            }

            btn.disabled = true;
            btn.textContent = "Отправка...";

            try {
                const res = await fetch(`${API_BASE}/submit`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                if (result.status === 'ok') {
                    tg.showPopup({
                        title: "Успех",
                        message: "Объявление отправлено на модерацию ИИ!",
                        buttons: [{type: "ok"}]
                    }, () => tg.close());
                } else {
                    alert("Ошибка: " + result.message);
                    btn.disabled = false;
                    btn.textContent = "Опубликовать объявление";
                }
            } catch (e) {
                alert("Ошибка сети");
                btn.disabled = false;
                btn.textContent = "Опубликовать объявление";
            }
        };

        init();
    </script>
</body>
</html>

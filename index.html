<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TGM Post</title>
    <link rel="stylesheet" href="style.css?v=4.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app" style="display:none;">
        <div class="section"><label id="wa_label_select_channel">...</label><select id="channel_select"></select></div>
        <div class="section">
            <div class="row-header">
                <label id="wa_label_text">...</label>
                <button id="wa_btn_clear" class="clear-btn">...</button>
            </div>
            <textarea id="ad_text"></textarea>
            <div class="row-tools">
                <div class="hint" id="wa_hint_text">...</div>
                                                <button type="button" class="icon-btn" id="attach_btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </button>

                <input type="file" id="file_input" multiple>
            </div>
            <div id="file_list" class="file-preview-list"></div>
        </div>
        <div class="section"><label id="wa_label_name">...</label><input type="text" id="contact_name"></div>
        <div class="row-fields">
            <div class="section"><label id="wa_label_phone">...</label><input type="text" id="contact_phone"></div>
            <div class="section"><label id="wa_label_email">...</label><input type="email" id="contact_email"></div>
        </div>
        <button id="submit_btn">
            <span id="btn_text">...</span>
            <div class="spinner-btn"></div>
        </button>
        <div id="help-container">
            <button class="help-icon-btn" onclick="toggleHelp()"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></button>
            <div id="help-text" class="help-content"></div>
        </div>

<!-- Капча Оверлей -->
        <div id="captcha_overlay" class="modal-overlay">
            <div class="modal-card">
                <h3 id="wa_captcha_title">Подтвердите, что вы не бот</h3>
                <p id="captcha_question" class="captcha-q">...</p>
                <input type="number" id="captcha_input" pattern="\d*">
                <input type="hidden" id="captcha_token">
                <button id="captcha_confirm_btn">OK</button>
            </div>
        </div>

        <!-- Коммерческое предложение -->
        <div id="commercial_overlay" class="modal-overlay">
            <div class="modal-card commercial-card">
                <div class="icon-box">💼</div>
                <h3 id="wa_comm_title">Бизнес-аккаунт</h3>
                <p id="comm_offer_text">...</p>
                <button id="comm_contact_btn" class="primary-btn">Связаться с нами</button>
                <button id="comm_close_btn" class="secondary-btn">Закрыть</button>
            </div>
        </div>
        
    </div>

    <div id="loader" style="padding: 50px; text-align: center; font-family: sans-serif; color: #777;">
        <div class="spinner" style="margin-bottom: 20px;"></div>
        <div id="debug-log" style="font-size: 10px; color: #aaa; text-align: left; background: #eee; padding: 10px; border-radius: 5px;">
            Initializing...
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let selectedFiles = [];
        const maxFiles = 5;   // максимально количество прикрепленных файлов
        const maxFileSize = 10 * 1024 * 1024; // 10 MB   максимальный размер каждого прикрепленного файла
        const logEl = document.getElementById('debug-log');
        function log(msg) { logEl.innerHTML += `<br>> ${msg}`; console.log(msg); }

        const API_BASE = "https://tgm-sync.sigmaboy.us/api"; 
        
        async function init() {
            log("SDK Ready check...");
            tg.ready();
            tg.expand();
            
            const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "Admin", language_code: "ru" };
            log(`User: ${user.id}, Lang: ${user.language_code}`);

            function getUrl(path, params = {}) {
                const url = new URL(`${API_BASE}${path}`);
                Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
                url.searchParams.append('v', Date.now());
                return url.toString();
            }

            try {
                log("Fetching Loc...");
                const locRes = await fetch(getUrl('/loc', { lang: user.language_code || 'ru' }));
                if (!locRes.ok) throw new Error(`Loc status: ${locRes.status}`);
                const loc = await locRes.json();
                window.LOC = loc;
                log("Loc OK");

                // Mapping
                const mapping = {
                    'wa_label_select_channel': 'wa_label_select_channel',
                    'wa_label_text': 'wa_label_text',
                    'wa_hint_text': 'wa_hint_text',
                    'wa_label_name': 'wa_label_name',
                    'wa_label_phone': 'wa_label_phone',
                    'wa_label_email': 'wa_label_email',
                    'wa_btn_clear': 'wa_btn_clear', // Добавлено для локализации кнопки очистки
                    'btn_text': 'wa_btn_submit',
                    'loader': 'wa_loading'
                };
                Object.keys(mapping).forEach(id => {
                    const el = document.getElementById(id);
                    if (el && loc[mapping[id]]) el.textContent = loc[mapping[id]];
                });
                document.getElementById('ad_text').placeholder = loc.wa_placeholder_text || "";
                document.getElementById('help-text').innerHTML = loc.wa_help_text || "";

                log("Fetching Channels...");
                const chRes = await fetch(getUrl('/channels'));
                const chData = await chRes.json();
                const select = document.getElementById('channel_select');
                chData.channels.forEach(ch => {
                    const opt = document.createElement('option');
                    opt.value = ch.id; opt.textContent = ch.name;
                    select.appendChild(opt);
                });
                log("Channels OK");

                log("Fetching Profile...");
                const prRes = await fetch(getUrl('/profile', { user_id: user.id }));
                const prData = await prRes.json();
                if (prData.data) {
                    document.getElementById('contact_name').value = prData.data.name || user.first_name || "";
                    document.getElementById('contact_phone').value = prData.data.phone || "";
                    document.getElementById('contact_email').value = prData.data.email || "";
                    // Восстанавливаем текст объявления
                    document.getElementById('ad_text').value = prData.data.last_text || "";
                }

                // Логика кнопки очистки
                document.getElementById('wa_btn_clear').onclick = () => {
                    document.getElementById('ad_text').value = "";
                };
                
                log("Profile OK");

                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                log("APP VISIBLE");

            } catch (e) {
                log(`<span style="color:red">ERROR: ${e.message}</span>`);
                console.error(e);
            }
        }

        // Кнопки и прочее...
        function toggleHelp() { document.getElementById('help-text').classList.toggle('open'); }
        
                document.getElementById('file_input').onchange = (e) => {
            const newFiles = Array.from(e.target.files || []);
            if (newFiles.length === 0) return;

            const currentCount = selectedFiles.length;
            const canAdd = maxFiles - currentCount;
            if (newFiles.length > canAdd) {
                tg.showAlert(`Можно прикрепить не более ${maxFiles} файлов. Добавлено только ${canAdd}.`);
                newFiles.splice(canAdd);
            }

            const validFiles = newFiles.filter(f => {
                if (f.size <= maxFileSize) return true;
                tg.showAlert(`Файл ${f.name} превышает лимит 10MB.`);
                return false;
            });

            selectedFiles = selectedFiles.concat(validFiles);

            updateFilePreview();
            e.target.value = ''; // очищаем input, чтобы можно было выбрать те же файлы заново
        };

        function updateFilePreview() {
            const list = document.getElementById('file_list');
            list.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.style.display = 'flex';
                item.style.alignItems = 'center';
                item.style.justifyContent = 'space-between';
                item.style.padding = '4px 0';

                const name = document.createElement('span');
                name.textContent = '📎 ' + file.name;
                name.style.flex = '1';
                name.style.whiteSpace = 'nowrap';
                name.style.overflow = 'hidden';
                name.style.textOverflow = 'ellipsis';

                const removeBtn = document.createElement('button');
                removeBtn.textContent = '✕';
                removeBtn.style.background = 'none';
                removeBtn.style.border = 'none';
                removeBtn.style.color = 'red';
                removeBtn.style.fontSize = '16px';
                removeBtn.style.cursor = 'pointer';
                removeBtn.style.marginLeft = '8px';
                removeBtn.onclick = () => {
                    selectedFiles.splice(index, 1);
                    updateFilePreview();
                };

                item.appendChild(name);
                item.appendChild(removeBtn);
                list.appendChild(item);

            // Визуально отключаем кнопку при лимите
            if (selectedFiles.length >= maxFiles) {
                attachBtn?.classList.add('disabled');
            } else {
                attachBtn?.classList.remove('disabled');
            }
                
            });
        }


                const attachBtn = document.getElementById('attach_btn');
        if (attachBtn) {
            attachBtn.onclick = () => {
                if (selectedFiles.length >= maxFiles) {
                    return; // просто ничего не делаем — диалог не открывается
                }
                console.log('Кнопка прикрепить нажата');
                document.getElementById('file_input').click();
            };
        } else {
            console.warn('Элемент #attach_btn не найден');
            // fallback на класс, если id потерян
            document.querySelector('.icon-btn')?.addEventListener('click', () => {
                if (selectedFiles.length >= maxFiles) {
                    return;
                }
                console.log('Fallback: .icon-btn нажата');
                document.getElementById('file_input').click();
            });

        }

        document.getElementById('captcha_confirm_btn').onclick = () => {
            const ans = document.getElementById('captcha_input').value;
            if (ans) {
                document.getElementById('captcha_overlay').style.display = 'none';
                sendAd(ans, document.getElementById('captcha_token').value);
            }
        };

        document.getElementById('submit_btn').onclick = () => sendAd();

        async function sendAd(captchaAnswer = null, captchaToken = null) {
            const btn = document.getElementById('submit_btn');
            const adText = document.getElementById('ad_text').value.trim();
            const phoneVal = document.getElementById('contact_phone').value.trim();
            const emailVal = document.getElementById('contact_email').value.trim();
            
            if (adText.length < 20) return tg.showAlert(window.LOC.wa_error_short || "Short text");

            btn.disabled = true;
            btn.classList.add('is-loading');
            const btnText = document.getElementById('btn_text');
            const originalText = btnText.textContent;
            btnText.textContent = window.LOC.wa_loading || "...";

            const formData = new FormData();
            formData.append('user_id', tg.initDataUnsafe?.user?.id || 12345);
            formData.append('channel_id', document.getElementById('channel_select').value);
            formData.append('text', adText);
            formData.append('contact_info', JSON.stringify({ 
                name: document.getElementById('contact_name').value, 
                phone: phoneVal, 
                email: emailVal 
            }));

            if (captchaAnswer) {
                formData.append('captcha_answer', captchaAnswer);
                formData.append('captcha_token', captchaToken);
            }

            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            try {
                const res = await fetch(`${API_BASE}/submit`, {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                if (res.ok && result.status === 'ok') {
                    tg.close();
                } else if (result.status === 'captcha_required') {
                    document.getElementById('captcha_question').textContent = result.question;
                    document.getElementById('captcha_token').value = result.captcha_token;
                    document.getElementById('captcha_input').value = '';
                    document.getElementById('captcha_overlay').style.display = 'flex';
                    
                    btn.disabled = false;
                    btn.classList.remove('is-loading');
                    btnText.textContent = originalText;
                } else if (result.status === 'limit_reached_commercial') {
                    document.getElementById('comm_offer_text').textContent = result.message;
                    document.getElementById('commercial_overlay').style.display = 'flex';
                    
                    document.getElementById('comm_contact_btn').onclick = () => {
                        tg.openTelegramLink(result.admin_url);
                    };
                    document.getElementById('comm_close_btn').onclick = () => {
                        document.getElementById('commercial_overlay').style.display = 'none';
                    };

                    btn.disabled = false;
                    btn.classList.remove('is-loading');
                    btnText.textContent = originalText;
                } else {
                    tg.showAlert(result.message || "Error"); 
                    btn.disabled = false; 
                    btn.classList.remove('is-loading');
                    btnText.textContent = originalText; 
                }
            } catch (e) {
                tg.showAlert("Network Error"); 
                btn.disabled = false; 
                btn.classList.remove('is-loading');
                btnText.textContent = originalText;
            }
        };

        init();
    </script>
</body>
</html>
